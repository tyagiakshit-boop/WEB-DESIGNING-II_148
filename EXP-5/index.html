<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            padding-top: 30px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-custom {
            margin-right: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center text-primary mb-4">Employee Management System</h2>

    <div class="card p-4 mb-4">
        <h4 class="mb-3">Add New Employee</h4>
        <div class="row g-3">
            <div class="col-md-3">
                <label for="empId" class="form-label">Employee ID</label>
                <input type="text" class="form-control" id="empId" placeholder="e.g., E101">
            </div>
            <div class="col-md-3">
                <label for="empName" class="form-label">Employee Name</label>
                <input type="text" class="form-control" id="empName" placeholder="Enter Name">
            </div>
            <div class="col-md-3">
                <label for="empSalary" class="form-label">Salary ($)</label>
                <input type="number" class="form-control" id="empSalary" placeholder="e.g., 60000">
            </div>
            <div class="col-md-3">
                <label for="empDept" class="form-label">Department</label>
                <select id="empDept" class="form-select">
                    <option value="" selected disabled>Select Dept</option>
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="Civil">Civil</option>
                    <option value="IT">IT</option>
                </select>
            </div>
        </div>
        
        <div class="mt-4">
            <button class="btn btn-success" type="button" onclick="addEmployee()">+ Add Employee</button>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <h4 class="mb-3">Analytics & Views</h4>
        <div>
            <button class="btn btn-primary btn-custom" type="button" onclick="displayAll()">Display All</button>
            <button class="btn btn-info btn-custom text-white" type="button" onclick="displayHighSalary()">Salary > 50,000</button>
            <button class="btn btn-warning btn-custom text-dark" type="button" onclick="showTotalSalary()">Total Salary</button>
            <button class="btn btn-secondary btn-custom" type="button" onclick="showAvgSalary()">Average Salary</button>
            <button class="btn btn-dark btn-custom" type="button" onclick=" countByDepartment()">Count by Department</button>
        </div>
    </div>

    <div class="card p-4">
        <h4 class="mb-3">Results</h4>
        <div id="outputArea" class="alert alert-light border">
            <em>Results will be displayed here...</em>
        </div>
    </div>

</div>
<script src="arrayop.js"></script>
</body>
</html>
